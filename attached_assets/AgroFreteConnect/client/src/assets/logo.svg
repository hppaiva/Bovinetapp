<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="60" fill="#25D366"/>
  
  <!-- Front-view truck -->
  <g transform="translate(25, 30)">
    <!-- Main truck body/cabin (front view) -->
    <rect x="20" y="15" width="30" height="35" rx="4" fill="white"/>
    
    <!-- Windshield -->
    <rect x="22" y="17" width="26" height="15" rx="2" fill="#E3F2FD" opacity="0.9"/>
    
    <!-- Front grille -->
    <rect x="23" y="35" width="24" height="8" rx="1" fill="#F0F0F0"/>
    <rect x="25" y="36" width="20" height="2" fill="#E0E0E0"/>
    <rect x="25" y="39" width="20" height="2" fill="#E0E0E0"/>
    
    <!-- Headlights -->
    <circle cx="27" cy="45" r="3" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <circle cx="43" cy="45" r="3" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <circle cx="27" cy="45" r="2" fill="#FFF3E0"/>
    <circle cx="43" cy="45" r="2" fill="#FFF3E0"/>
    
    <!-- Front bumper -->
    <rect x="22" y="50" width="26" height="4" rx="2" fill="white"/>
    
    <!-- Side mirrors -->
    <ellipse cx="15" cy="25" rx="3" ry="2" fill="white"/>
    <ellipse cx="55" cy="25" rx="3" ry="2" fill="white"/>
    
    <!-- Wheels (front view) -->
    <g>
      <!-- Left wheel -->
      <circle cx="28" cy="55" r="8" fill="#2E2E2E"/>
      <circle cx="28" cy="55" r="6" fill="white"/>
      <circle cx="28" cy="55" r="4" fill="#757575"/>
      <circle cx="28" cy="55" r="2" fill="#424242"/>
      <!-- Wheel pattern -->
      <path d="M24 51 L32 59 M32 51 L24 59" stroke="white" stroke-width="1" opacity="0.7"/>
      
      <!-- Right wheel -->
      <circle cx="42" cy="55" r="8" fill="#2E2E2E"/>
      <circle cx="42" cy="55" r="6" fill="white"/>
      <circle cx="42" cy="55" r="4" fill="#757575"/>
      <circle cx="42" cy="55" r="2" fill="#424242"/>
      <!-- Wheel pattern -->
      <path d="M38 51 L46 59 M46 51 L38 59" stroke="white" stroke-width="1" opacity="0.7"/>
    </g>
    
    <!-- License plate area -->
    <rect x="30" y="47" width="10" height="3" rx="1" fill="#F0F0F0"/>
    
    <!-- Cabin details -->
    <rect x="24" y="20" width="22" height="2" fill="#E0E0E0" opacity="0.5"/>
    <rect x="32" y="25" width="6" height="1" fill="#E0E0E0"/>
  </g>
</svg>