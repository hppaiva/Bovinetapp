<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oferecer Frete - Bovinet</title>
  <style>
    body {
      background-color: #1E2A38;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    .form-container {
      background-color: #2F3E4E;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: none;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background-color: #00FF88;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      color: #1E2A38;
    }
    button:hover {
      background-color: #00cc6a;
    }
  </style>
</head>
<body>
  <div style="text-align:center; margin-top: 20px;"><img src="logo.png" alt="Logo Bovinet" style="width: 120px;" /></div>


  <h2>Cadastro de Caminhoneiro - Oferecer Frete</h2>

  <div class="form-container">
    <form id="freteForm">
      <label for="nome">Nome completo:</label>
      <input type="text" id="nome" required />

      <label for="modelo">Modelo do caminhão:</label>
      <select id="modelo" required>
        <option value="">Selecione</option>
        <option value="Truck">Truck</option>
        <option value="Bitruck">Bitruck</option>
        <option value="Carreta">Carreta</option>
        <option value="Boiadeiro pequeno">Boiadeiro pequeno</option>
      </select>

      <label for="capacidadeAdultos">Capacidade - Animais adultos:</label>
      <input type="number" id="capacidadeAdultos" required />

      <label for="capacidadeBezerros">Capacidade - Bezerros:</label>
      <input type="number" id="capacidadeBezerros" required />

      <label for="cidade">Cidade de residência:</label>
      <input type="text" id="cidade" required />

      <label for="precoKm">Preço por KM (R$):</label>
      <input type="number" id="precoKm" step="0.01" required />

      <label for="whatsapp">Número do WhatsApp:</label>
      <input type="text" id="whatsapp" placeholder="DDD + número" required />

  <button onclick="window.location.href='PerfilCaminhoneiro.html'">
    Cadastrar Caminhoneiro
  </button>


  <script>
    document.getElementById('freteForm').addEventListener('submit', function(event) {
      event.preventDefault();
      alert("Cadastro enviado com sucesso! 🚚🐄");
      // Aqui você poderá enviar os dados para o backend futuramente
    });
  </script>

</body>
</html>
