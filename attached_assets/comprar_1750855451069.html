<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comprar - Bovinet</title>
  <style>
    body {
      background-color: #1E2A38;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .logo {
      display: block;
      margin: 0 auto 20px;
      max-width: 180px;
    }
    .filter-section {
      background-color: #2F3E4E;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }
    .checkbox-group {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }
    select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: none;
    }
    button {
      background-color: white;
      color: #1E2A38;
      font-weight: bold;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 15px;
    }
    .results {
      margin-top: 20px;
    }
    .post {
      background-color: #fff;
      color: #000;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 15px;
    }
    .post video {
      width: 100%;
      border-radius: 8px;
      margin-top: 10px;
    }
    .field-group {
      margin-top: 10px;
    }
    .preco-info {
      margin-top: 10px;
      background-color: #f2f2f2;
      padding: 8px;
      border-radius: 8px;
      color: #000;
    }
    .botao-grupo {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .botao-whatsapp {
      flex: 1;
      background-color: #25D366;
      color: white;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }
    .botao-whatsapp:hover {
      background-color: #1ebe5d;
    }
  </style>
</head>
<body>

  <img src="logo.png" class="logo" alt="Logo Bovinet" />

  <div class="filter-section">
    <h2>Filtrar animais</h2>

    <label>Sexo:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" id="macho" /> Macho</label>
      <label><input type="checkbox" id="femea" /> Fêmea</label>
    </div>

    <label>Aptidão:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" id="macho" /> Leite</label>
      <label><input type="checkbox" id="femea" /> Corte</label>
    </div>

    <div class="field-group">
      <label>Idade:</label>
      <select id="idade">
        <option value="">Todas</option>
        <option value="ate12">Até 12 meses</option>
        <option value="12a24">De 12 a 24 meses</option>
        <option value="24a36">De 24 a 36 meses</option>
        <option value="36a48">De 36 a 48 meses</option>
      </select>
    </div>

    <div class="field-group">
      <label>Raio de distância:</label>
      <select id="raio">
        <option value="">Qualquer distância</option>
        <option value="10">Até 10 km</option>
        <option value="50">Até 50 km</option>
        <option value="100">Até 100 km</option>
        <option value="200">Até 200 km</option>
      </select>
    </div>

    <button onclick="filtrar()">Filtrar</button>
  </div>

  <div class="results" id="resultados">
    <div class="post">
      <h3 id="tituloLote">Vaca Nelore Prenhe</h3>
      <p><strong>Quantidade:</strong> 22</p>
      <p><strong>Sexo:</strong> Fêmea</p>
      <p><strong>Idade:</strong> 36 meses</p>
      <p><strong>Peso:</strong> 420 kg</p>
      <p><strong>Preço por cabeça:</strong> R$ 4.200</p>
      <p><strong>Cidade:</strong> Uberaba - MG</p>

      <div class="preco-info">
        💰 <strong>Preço por arroba:</strong> R$ <span id="precoArroba1">-</span><br>
        🚛 <strong>Média de frete estimado:</strong> R$ 750,00
      </div>

      <video src="video-exemplo.mp4" controls></video>

      <div class="botao-grupo">
        <a id="botao-whatsapp" class="botao-whatsapp" target="_blank">TENHO INTERESSE</a>
      </div>
    </div>
  </div>

  <script>
    function filtrar() {
      alert("Filtros aplicados! (funcionalidade futura)");
    }

    // Cálculo do preço por arroba
    const pesoKg = 420;
    const precoCabeca = 4200;
    const arrobas = pesoKg / 30;
    const precoPorArroba = precoCabeca / arrobas;
    document.getElementById("precoArroba1").textContent = precoPorArroba.toFixed(2);

    // WhatsApp automático com mensagem personalizada
    const nomeDoLote = document.getElementById("tituloLote").textContent;
    const numeroWhatsapp = "5534991195042"; // Seu número
    const mensagem = `Olá, tenho interesse no lote "${nomeDoLote}" anunciado no app Bovinet.`;

    const linkWhatsApp = `https://wa.me/${numeroWhatsapp}?text=${encodeURIComponent(mensagem)}`;
    document.getElementById("botao-whatsapp").href = linkWhatsApp;
  </script>

</body>
</html>
